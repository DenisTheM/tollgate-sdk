name: SDK CI

on:
  push:
    branches: [main]
    paths: [packages/sdk/**]
  pull_request:
    branches: [main]
    paths: [packages/sdk/**]

defaults:
  run:
    working-directory: packages/sdk

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci

      # npm audit – fail on high/critical
      - name: npm audit
        run: npm audit --audit-level=high

      # Verify lockfile integrity (detect manipulation)
      - name: Lockfile integrity check
        run: |
          npm ci --ignore-scripts
          git diff --exit-code package-lock.json

  publish:
    name: Publish to npm
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write  # Required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run build

      # Ensure .npmrc with auth is available in working directory
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only publish if version changed
      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @tollgate/sdk version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL (remote: $REMOTE)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published, skipping"
          fi

      - name: Publish with provenance
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
