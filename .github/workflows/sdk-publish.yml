name: Publish to npm

on:
  push:
    branches: [main]
    paths: [packages/sdk/**, .github/workflows/sdk-publish.yml]

defaults:
  run:
    working-directory: packages/sdk

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run build

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @monapi/sdk version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL (remote: $REMOTE)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published, skipping"
          fi

      - name: Publish with provenance
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN1 }}
